<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WS Reader · Delfia</title>
<style>
  :root{
    --bg:#0a0a0a; --panel:#111; --line:#1e1e1e;
    --green:#00ff85; --dim:#5a5a5a; --txt:#e6e6e6;
    --red:#ff4d4d; --yellow:#ffd24d; --blue:#4db8ff;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--txt);
    font-family:"JetBrains Mono","SF Mono",ui-monospace,Menlo,Consolas,monospace;
    font-size:13px; height:100vh; display:flex; flex-direction:column;
  }
  header{
    padding:14px 18px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:12px;
  }
  .logo{color:var(--green); font-weight:700; letter-spacing:2px; text-transform:uppercase}
  .logo small{color:var(--dim); font-weight:400; letter-spacing:1px}
  .bar{
    display:flex; gap:8px; padding:14px 18px; border-bottom:1px solid var(--line);
    flex-wrap:wrap; align-items:center;
  }
  input[type=text]{
    flex:1; min-width:280px; background:#000; border:1px solid var(--line);
    color:var(--txt); padding:10px 12px; border-radius:6px; font-family:inherit; font-size:13px;
  }
  input[type=text]:focus{outline:none; border-color:var(--green)}
  button{
    background:var(--green); color:#000; border:0; padding:10px 18px;
    border-radius:6px; font-weight:700; cursor:pointer; font-family:inherit;
    text-transform:uppercase; letter-spacing:1px; font-size:12px;
  }
  button.ghost{background:transparent; color:var(--dim); border:1px solid var(--line)}
  button.ghost:hover{color:var(--txt); border-color:var(--dim)}
  button:disabled{opacity:.4; cursor:not-allowed}
  .status{
    display:flex; align-items:center; gap:7px; padding:8px 18px;
    border-bottom:1px solid var(--line); color:var(--dim); font-size:12px;
  }
  .dot{width:9px; height:9px; border-radius:50%; background:var(--dim); flex:none}
  .dot.on{background:var(--green); box-shadow:0 0 8px var(--green)}
  .dot.connecting{background:var(--yellow); animation:pulse 1s infinite}
  .dot.err{background:var(--red)}
  @keyframes pulse{50%{opacity:.3}}
  #log{flex:1; overflow-y:auto; padding:8px 0}
  .msg{
    padding:5px 18px; border-bottom:1px solid #131313; display:flex; gap:10px;
    white-space:pre-wrap; word-break:break-word; line-height:1.5;
  }
  .msg .t{color:var(--dim); flex:none; font-size:11px}
  .msg .tag{flex:none; font-weight:700; font-size:11px; min-width:46px}
  .msg.in  .tag{color:var(--green)}
  .msg.out .tag{color:var(--blue)}
  .msg.sys .tag{color:var(--yellow)}
  .msg.err .tag{color:var(--red)}
  .msg .body{flex:1}
  .sendbar{display:flex; gap:8px; padding:12px 18px; border-top:1px solid var(--line)}
  .meta{padding:6px 18px; color:var(--dim); font-size:11px; border-bottom:1px solid var(--line)}
  a{color:var(--green)}
</style>
</head>
<body>
  <header>
    <span class="logo">DELFIA <small>// ws reader</small></span>
  </header>

  <div class="bar">
    <input id="url" type="text" placeholder="wss://exemplo.com/socket" spellcheck="false"
           value="wss://echo.websocket.org">
    <input id="proto" type="text" placeholder="subprotocolo (opcional)" style="flex:0; min-width:160px">
    <button id="connect">Conectar</button>
    <button id="disconnect" class="ghost" disabled>Desconectar</button>
    <button id="clear" class="ghost">Limpar</button>
  </div>

  <div class="status">
    <span id="dot" class="dot"></span>
    <span id="statusText">desconectado</span>
    <span id="counter" style="margin-left:auto"></span>
  </div>

  <div id="log"></div>

  <div class="sendbar">
    <input id="send" type="text" placeholder="enviar mensagem (Enter)…" spellcheck="false" disabled>
    <button id="sendBtn" disabled>Enviar</button>
  </div>

<script>
const $ = s => document.querySelector(s);
const logEl = $('#log');
let ws = null, count = 0;

function ts(){
  const d = new Date();
  return d.toLocaleTimeString('pt-BR', {hour12:false}) + '.' +
         String(d.getMilliseconds()).padStart(3,'0');
}

function add(kind, tag, body){
  const row = document.createElement('div');
  row.className = 'msg ' + kind;
  const t = document.createElement('span'); t.className='t'; t.textContent = ts();
  const g = document.createElement('span'); g.className='tag'; g.textContent = tag;
  const b = document.createElement('span'); b.className='body'; b.textContent = body;
  row.append(t,g,b);
  const atBottom = logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 40;
  logEl.appendChild(row);
  if(atBottom) logEl.scrollTop = logEl.scrollHeight;
}

function pretty(data){
  if(typeof data !== 'string') return data;
  try{ return JSON.stringify(JSON.parse(data), null, 2); }
  catch(e){ return data; }
}

function setStatus(state, text){
  $('#dot').className = 'dot ' + state;
  $('#statusText').textContent = text;
}

function setConnected(on){
  $('#connect').disabled = on;
  $('#disconnect').disabled = !on;
  $('#url').disabled = on;
  $('#proto').disabled = on;
  $('#send').disabled = !on;
  $('#sendBtn').disabled = !on;
}

function connect(){
  const url = $('#url').value.trim();
  if(!url) return;
  if(!/^wss?:\/\//i.test(url)){
    add('err','ERRO','URL deve começar com ws:// ou wss://');
    return;
  }
  const proto = $('#proto').value.trim();
  setStatus('connecting','conectando…');
  setConnected(true);
  add('sys','SYS','Conectando a ' + url + (proto ? ' [' + proto + ']' : ''));

  try{
    ws = proto ? new WebSocket(url, proto.split(',').map(s=>s.trim())) : new WebSocket(url);
  }catch(e){
    add('err','ERRO', e.message);
    setStatus('err','falha'); setConnected(false); return;
  }

  ws.binaryType = 'arraybuffer';

  ws.onopen = () => { setStatus('on','conectado'); add('sys','SYS','Conexão aberta'); };

  ws.onmessage = (ev) => {
    count++;
    $('#counter').textContent = count + ' msg';
    let data = ev.data;
    if(data instanceof ArrayBuffer){
      const bytes = new Uint8Array(data);
      const hex = [...bytes].map(b=>b.toString(16).padStart(2,'0')).join(' ');
      add('in','◄ BIN', `[${bytes.length} bytes] ` + hex);
    }else{
      add('in','◄ IN', pretty(data));
    }
  };

  ws.onerror = () => { add('err','ERRO','Erro no socket (veja o console p/ detalhes)'); setStatus('err','erro'); };

  ws.onclose = (ev) => {
    add('sys','SYS', `Conexão fechada (code ${ev.code}${ev.reason ? ', '+ev.reason : ''})`);
    setStatus('', 'desconectado'); setConnected(false); ws = null;
  };
}

function disconnect(){ if(ws) ws.close(1000,'fechado pelo usuário'); }

function send(){
  const v = $('#send').value;
  if(!ws || ws.readyState !== WebSocket.OPEN || !v) return;
  ws.send(v);
  add('out','► OUT', v);
  $('#send').value = '';
}

$('#connect').onclick = connect;
$('#disconnect').onclick = disconnect;
$('#clear').onclick = () => { logEl.innerHTML=''; count=0; $('#counter').textContent=''; };
$('#sendBtn').onclick = send;
$('#send').addEventListener('keydown', e => { if(e.key==='Enter') send(); });
$('#url').addEventListener('keydown', e => { if(e.key==='Enter') connect(); });
</script>
</body>
</html>
